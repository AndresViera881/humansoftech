<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" fill="none">
  <defs>
    <linearGradient id="tbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="tscreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150025"/><stop offset="60%" stop-color="#200040"/><stop offset="100%" stop-color="#150025"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="10" y="10" width="160" height="200" rx="14" fill="url(#tbody)" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="18" y="22" width="144" height="176" rx="6" fill="url(#tscreen)"/>
  <!-- Camera -->
  <circle cx="90" cy="16" r="3" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="0.5"/>
  <!-- Screen content -->
  <rect x="25" y="32" width="90" height="4" rx="2" fill="#e91e8c" filter="url(#glow3)" opacity="0.9"/>
  <rect x="25" y="40" width="60" height="2" rx="1" fill="#8b5cf6" opacity="0.5"/>
  <!-- Grid icons -->
  <rect x="25" y="55" width="38" height="38" rx="6" fill="#e91e8c" opacity="0.1" stroke="#e91e8c" stroke-width="0.8"/>
  <rect x="70" y="55" width="38" height="38" rx="6" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="0.8"/>
  <rect x="115" y="55" width="38" height="38" rx="6" fill="#e91e8c" opacity="0.08" stroke="#e91e8c" stroke-width="0.5"/>
  <rect x="25" y="100" width="38" height="38" rx="6" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.5"/>
  <rect x="70" y="100" width="38" height="38" rx="6" fill="#e91e8c" opacity="0.1" stroke="#e91e8c" stroke-width="0.8"/>
  <rect x="115" y="100" width="38" height="38" rx="6" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="0.8"/>
  <!-- Bottom bar -->
  <rect x="25" y="150" width="130" height="28" rx="4" fill="rgba(233,30,140,0.08)" stroke="#e91e8c" stroke-width="0.5"/>
  <rect x="32" y="156" width="50" height="3" rx="1.5" fill="#8b5cf6" opacity="0.6"/>
  <rect x="32" y="163" width="35" height="2" rx="1" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="140" cy="161" r="6" fill="none" stroke="#e91e8c" stroke-width="1" filter="url(#glow3)"/>
  <!-- Home bar -->
  <rect x="75" y="202" width="30" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
</svg>
