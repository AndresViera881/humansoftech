<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="50%" stop-color="#2d0060"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Base/keyboard -->
  <rect x="20" y="110" width="160" height="30" rx="4" fill="url(#body)" stroke="#e91e8c" stroke-width="0.8"/>
  <rect x="70" y="118" width="60" height="6" rx="3" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="0.5"/>
  <!-- Screen hinge -->
  <rect x="20" y="108" width="160" height="4" rx="1" fill="#0d0d1a"/>
  <!-- Screen -->
  <rect x="25" y="15" width="150" height="95" rx="4" fill="url(#body)" stroke="#e91e8c" stroke-width="1"/>
  <rect x="30" y="20" width="140" height="85" rx="2" fill="url(#screen)"/>
  <!-- Screen content - neon lines -->
  <rect x="35" y="30" width="60" height="3" rx="1" fill="#e91e8c" filter="url(#glow)" opacity="0.9"/>
  <rect x="35" y="38" width="40" height="2" rx="1" fill="#8b5cf6" opacity="0.6"/>
  <rect x="35" y="44" width="50" height="2" rx="1" fill="#8b5cf6" opacity="0.4"/>
  <rect x="35" y="50" width="45" height="2" rx="1" fill="#8b5cf6" opacity="0.4"/>
  <!-- Chart bars -->
  <rect x="110" y="50" width="12" height="35" rx="1" fill="#e91e8c" opacity="0.7" filter="url(#glow)"/>
  <rect x="126" y="40" width="12" height="45" rx="1" fill="#8b5cf6" opacity="0.8" filter="url(#glow)"/>
  <rect x="142" y="55" width="12" height="30" rx="1" fill="#e91e8c" opacity="0.5" filter="url(#glow)"/>
  <!-- Logo dot -->
  <circle cx="100" cy="115" r="3" fill="#e91e8c" filter="url(#glow)" opacity="0.8"/>
  <!-- Neon border glow -->
  <rect x="25" y="15" width="150" height="95" rx="4" fill="none" stroke="#e91e8c" stroke-width="0.5" opacity="0.4"/>
</svg>
