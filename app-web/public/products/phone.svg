<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <defs>
    <linearGradient id="pbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="pscreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#150025"/>
      <stop offset="50%" stop-color="#2a0050"/>
      <stop offset="100%" stop-color="#150025"/>
    </linearGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="10" y="10" width="100" height="180" rx="16" fill="url(#pbody)" stroke="#e91e8c" stroke-width="1"/>
  <rect x="15" y="25" width="90" height="145" rx="8" fill="url(#pscreen)"/>
  <!-- Notch -->
  <rect x="45" y="18" width="30" height="8" rx="4" fill="#0d0d1a"/>
  <!-- Screen elements -->
  <circle cx="60" cy="65" r="22" fill="none" stroke="#e91e8c" stroke-width="1.5" filter="url(#glow2)" opacity="0.8"/>
  <circle cx="60" cy="65" r="14" fill="#e91e8c" opacity="0.15" filter="url(#glow2)"/>
  <path d="M50 65 L57 58 L70 72" stroke="#e91e8c" stroke-width="2" stroke-linecap="round" filter="url(#glow2)"/>
  <!-- Info lines -->
  <rect x="25" y="98" width="70" height="3" rx="1.5" fill="#8b5cf6" opacity="0.7"/>
  <rect x="30" y="106" width="55" height="2" rx="1" fill="#8b5cf6" opacity="0.4"/>
  <rect x="25" y="118" width="30" height="12" rx="2" fill="#e91e8c" opacity="0.2" stroke="#e91e8c" stroke-width="0.5"/>
  <rect x="62" y="118" width="33" height="12" rx="2" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="0.5"/>
  <!-- Home indicator -->
  <rect x="45" y="160" width="30" height="3" rx="1.5" fill="#e91e8c" opacity="0.5"/>
  <!-- Side buttons -->
  <rect x="8" y="60" width="2" height="20" rx="1" fill="#8b5cf6" opacity="0.6"/>
  <rect x="110" y="55" width="2" height="15" rx="1" fill="#8b5cf6" opacity="0.6"/>
</svg>
